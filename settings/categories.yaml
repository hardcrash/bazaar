# settings/categories.yaml
# ==============================================================================
# CATEGORY INTERPOLATION REGISTRY - HARDWARE EXTRACTION LAYER
# ==============================================================================
# Configures native platform sweeps, text processing filters, and heuristic
# validation thresholds for parsing hardware targets from volatile unstructured markets.
# Sub-arrays handle layout token clearing, variant classification mapping, 
# and localized noise blacklists to target specific platform conditions.

CPU:
  strategy_class: "CpuStrategy"

  # 🌟 Live Sourcing Queries: Targeted defect-first hunting terms
  defect_queries: [
    "AM4 bent",
    "AM4 bent pins",
    "AM4 broken pins",
    "Ryzen bent pins"
  ]

  # 🌟 Valuation Baseline Queries: Specific high-value 5000-series AM4 chips
  valid_models: [
    "5800X"
  ]

#   valid_models: [
#   "5950X",
#   "5900XT",
#   "5900 XT",
#   "5900X",
#   "5900 X",
#   "5900",
#   "5800X3D",
#   "5800 X3D",
#   "5800XT",
#   "5800 XT",
#   "5800X",
#   "5800 X",
#   "5800",
#   "5700X3D",
#   "5700 X3D",
#   "5700X",
#   "5700 X",
#   "5600X3D",
#   "5600 X3D",
#   "5600XT",
#   "5600 XT",
#   "5600X",
#   "5600 X",
#   "5600"
# ]

  model_variants:
    "5950X": ["5950X"]
    "5900X": ["5900X", "5900XT", "5900"]
    "5800X": ["5800X", "5800X3D", "5800XT", "5800"]
    "5700X": ["5700X", "5700X3D"]
    "5600X": ["5600X", "5600X3D", "5600XT", "5600"]

  # 🌟 Multi-Sku Matrix Pool: Models to check for cross-bleed dropdown listings
  multisku_models: [
    "5600X", "5700X", "5700X3D", "5800X", "5800X3D", "5900X", "5950X"
  ]

  brands: ["AMD"]

  search_format: "Ryzen {model}"

  # Keeps regex focused solely on capturing Zen 3 (5000 series) variants
  patterns: ["RYZEN(?:\\s+[579])?\\s+(5\\d{3}(?:X3D|X|G|GE|XT)?)\\b"]

  title_noise_words: [
    "DDR4", "DDR5", "CPU", "SOCKET", 
    "L@@K", "LOOK", "MINT", "PERFECT", "TESTED", "WORKING", 
    "FAST SHIP", "FAST SHIPPING", "FREE SHIPPING", "MUST SEE", "GREAT DEAL", 
    "NIB", "BNIB", "NEW"
  ]

  # Native eBay API and scrape exclusion filters compiled at runtime (Keeps keyword count under 15)
  blacklist_words: [
    # "BUNDLE", "LAPTOP", "PC", "BAREBONES", "SYSTEM", "OPTANE", "P4800X", "P5800X", "HP IC"
  ]

  local_noise_blacklist: [
    # --- Structural Overlaps ---
    "SAW", "BLADE", "HSS", "TOOL STEEL", "MACHINERY", "WAVE",
    "ROCKFORD", "FOSGATE", "AMPLIFIER", "AMP COMBO", "MOBO COMBO",
    "SUPPORT FOR", "COMPATIBLE WITH", "DIXIE", "MA5800", "YAMAYO",
    "MOOG JOINT", "VVG",

    # --- Industrial & Heavy Machinery Part Collisions ---
    "CUMMINS", "FUEL INJECTOR", "FUEL NOZZLE", "GASKET", "VALVE",
    "HONDA CARBURETOR", "ENGINE", "GARDEN MOWER", "FLANGE PUMP",
    "BEARING SEAL",

    # --- Component-Only / Accessory Cross-listings ---
    "INTEL", "XEON", "I7", "I9", "NVIDIA", "GEFORCE", "RTX",
    "AIO COOLER", "THERMAL PASTE", "PASTE ONLY",
    "BOX ONLY", "EMPTY BOX", "PACKAGING ONLY", "RETAIL BOX ONLY",
    "FAN ONLY", "COOLER ONLY", "HEATSINK ONLY", "NO CPU", "LESS CPU", "OPTANE", 
    "P4800X", "P5800X", "HP IC",

    # --- Full System Exclusions ---
    "FULL TOWER", "GAMING RIG", "GAMING PC", "FULL PC", "DESKTOP PC",
    "SYSTEM BUILT", "DESKTOP TOWER", "BUNDLE", "LAPTOP", "PC", "BAREBONES", "SYSTEM"
  ]

  # Paramaters for the active listings harvest pipeline.
  active_harvest:
    enabled: true
    limit_per_sweep: 200
    min_price: 50
    max_price: 650
    step_size: 600.0  
    ebay_category_id: 164
    ebay_condition: [2000, 3000, 7000]

  # Parameters for the historical listings harvets pipeline.
  historical_harvest:
    enabled: true
    limit_per_sweep: 2000
    require_sold: true
    step_size: 10.0 
    ebay_category_id: [164]
    ebay_condition: []
    # Price boundaries for broken (sourcing) parts.   
    min_price_broken: 80
    max_price_broken: 100
    # Price boundaries for  used/refurbished parts. 
    min_price_used: 110
    max_price_used: 130 
    
