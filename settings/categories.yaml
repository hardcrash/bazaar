# ==============================================================================
# CATEGORY INTERPOLATION REGISTRY - HARDWARE EXTRACTION LAYER
# ==============================================================================
# Configures platform sweeps, text processing filters, and heuristic validation.

CPU:
  strategy_class: "CpuStrategy"
  
  # ========================================================
  # Global Configuration (Shared across Active & Historical)
  # ========================================================
  global:
    search_format: "Ryzen {model}"
    
    # Active testing model (Swap with commented block below for production)
    valid_models: [
      "5800X"
    ]

    # Target boundaries to isolate standalone silicon from accessory/whole-system noise
    model_price_profiles:
      "5950X":
        used_min: 160.00
        used_max: 260.00
        broken_min: 35.00
        broken_max: 100.00
      "5900X":
        used_min: 120.00
        used_max: 180.00
        broken_min: 25.00
        broken_max: 75.00
      "5800X3D":
        used_min: 150.00
        used_max: 240.00
        broken_min: 40.00
        broken_max: 110.00
      "5800X":
        used_min: 90.00
        used_max: 140.00
        broken_min: 15.00
        broken_max: 55.00
      "5700X3D":
        used_min: 120.00
        used_max: 170.00
        broken_min: 25.00
        broken_max: 70.00
      "5700X":
        used_min: 80.00
        used_max: 120.00
        broken_min: 15.00
        broken_max: 45.00
      "5600X":
        used_min: 60.00
        used_max: 95.00
        broken_min: 10.00
        broken_max: 35.00

    model_variants:
      "5950X": ["5950X"]
      "5900X": ["5900X", "5900XT", "5900"]
      "5800X": ["5800X", "5800X3D", "5800XT", "5800"]
      "5700X": ["5700X", "5700X3D"]
      "5600X": ["5600X", "5600X3D", "5600XT", "5600"]

    multisku_models: [
      "5600X", "5700X", "5700X3D", "5800X", "5800X3D", "5900X", "5950X"
    ]

    title_noise_words: [
      "DDR4", "DDR5", "CPU", "SOCKET", "L@@K", "LOOK", "MINT", "PERFECT", 
      "TESTED", "WORKING", "FAST SHIP", "FAST SHIPPING", "FREE SHIPPING", 
      "MUST SEE", "GREAT DEAL", "NIB", "BNIB", "NEW"
    ]

    local_noise_blacklist:
      # Absolute unrepairable physical damage
      - "DELIDDED"
      - "DELID"
      - "CRACKED DIE"
      - "CRACKED"
      - "BURNT"
      - "BURNED"
      - "SHORTED"
      - "SMOKE"
      - "REFLOW"
      - "CHIPPED"
      # Component/Accessory cross-bleed
      - "INTEL"
      - "XEON"
      - "AIO COOLER"
      - "THERMAL PASTE"
      - "PASTE ONLY"
      - "BOX ONLY"
      - "EMPTY BOX"
      - "PACKAGING ONLY"
      - "RETAIL BOX ONLY"
      - "FAN ONLY"
      - "COOLER ONLY"
      - "HEATSINK ONLY"
      - "NO CPU"
      - "LESS CPU"
      # Whole-system structural overlaps
      - "MOBO COMBO"
      - "FULL TOWER"
      - "GAMING RIG"
      - "GAMING PC"
      - "FULL PC"
      - "DESKTOP PC"
      - "SYSTEM BUILT"
      - "DESKTOP TOWER"

    api_blacklist_words: [
      "BUNDLE", "LAPTOP", "PC", "BAREBONES", "SYSTEM", "OPTANE", "P4800X", "P5800X", "HP IC"
    ]

 # ========================================================
  # Active Listings Harvest Pipeline
  # ========================================================
  active_harvest:
    enabled: true
    limit_per_sweep: 500
    min_price: 10.00  
    max_price: 300.00
    step_size: 20.0  
    ebay_category_id: 164
    # Focus exclusively on "For Parts or Not Working" at the source harvest level
    ebay_condition: [7000]

    alternative_queries: [
      "AM4 bent",
      "AM4 bent pins",
      "AM4 broken pins",
      "Ryzen bent pins"
    ]

    # Domain configuration: Target mechanical defects explicitly
    pin_defect_keywords: [
      "BENT PIN", "BENT PINS", "MISSING PIN", "MISSING PINS", 
      "BROKEN PIN", "BROKEN PINS", "SNAPPED PIN", "SNAPPED PINS",
      "DAMAGED PIN", "DAMAGED PINS"
    ]

    salvage_keywords: [
      "FOR REPAIR", "DEFECTIVE", "DAMAGED", "BROKEN"
    ]

    distress_keywords: [
      "READ DESCRIPTION", "READ DESC", "READ DETAILS", "PLEASE READ", "ISSUES"
    ]

    functional_keywords: [
      "TESTED WORKING", "100% WORKING", "PERFECT", "EXCELLENT"
    ]

  # ========================================================
  # Historical Listings Harvest Pipeline
  # ========================================================
  historical_harvest:
    enabled: true
    limit_per_sweep: 500
    require_sold: true
    step_size: 10.0 
    ebay_category_id: [164]
    ebay_condition: [2000, 3000, 7000]
    
    # Note: Target thresholds are now handled dynamically via global.model_price_profiles
    use_profile_bounds: true

    alternative_queries: []

